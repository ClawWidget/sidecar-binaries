name: Auto-Update yt-dlp

on:
  # Daily check — no human action required
  schedule:
    - cron: '0 8 * * *' # 8 AM UTC every day
  # Optional: run from the Actions tab when you want an immediate refresh
  workflow_dispatch:
  # Run on every push to main except commits that only touch manifest.json (avoids bot push loops)
  push:
    branches: [main]
    paths-ignore:
      - 'manifest.json'

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to commit changes

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Latest yt-dlp & Update Manifest
        run: |
          # 1. Get the latest release tag
          LATEST_TAG=$(curl -sL https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest | jq -r .tag_name)
          echo "Latest yt-dlp version: $LATEST_TAG"
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV

          # 2. Download their official SHA256 checksum file
          curl -sL "https://github.com/yt-dlp/yt-dlp/releases/download/${LATEST_TAG}/SHA2-256SUMS" -o sums.txt

          # 3. Extract the hash specifically for the macOS binary
          MAC_HASH=$(grep "yt-dlp_macos$" sums.txt | awk '{print $1}')
          MAC_URL="https://github.com/yt-dlp/yt-dlp/releases/download/${LATEST_TAG}/yt-dlp_macos"

          echo "macOS Hash: $MAC_HASH"

          # 4. Use jq to magically update your manifest.json
          jq --arg version "$LATEST_TAG" \
             --arg hash "$MAC_HASH" \
             --arg url "$MAC_URL" \
             '.sidecars["yt-dlp"].version = $version |
              .sidecars["yt-dlp"].platforms["darwin-aarch64"].url = $url |
              .sidecars["yt-dlp"].platforms["darwin-aarch64"].sha256 = $hash |
              .sidecars["yt-dlp"].platforms["darwin-x86_64"].url = $url |
              .sidecars["yt-dlp"].platforms["darwin-x86_64"].sha256 = $hash |
              .meta.last_updated = (now | strftime("%Y-%m-%dT%H:%M:%SZ"))' manifest.json > tmp.json && mv tmp.json manifest.json

          rm sums.txt

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Auto-update yt-dlp to ${{ env.LATEST_TAG }}"
          file_pattern: manifest.json
