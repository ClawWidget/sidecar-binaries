name: Auto-Build Tesseract (Intel)

on:
  schedule:
    - cron: '45 8 * * *' # Runs 15 mins after the ARM build
  workflow_dispatch:

jobs:
  build-tesseract-intel:
    # macos-13 was retired Dec 2025; Intel x86_64 is macos-15-intel until ~Aug 2027
    runs-on: macos-15-intel
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Tesseract & Bundler
        run: |
          brew update
          brew install tesseract dylibbundler
          TESS_VERSION=$(tesseract --version | head -n 1 | awk '{print $2}')
          echo "tag=$TESS_VERSION" >> $GITHUB_ENV

      - name: Bundle Executable, Libraries, and Models
        run: |
          mkdir -p dist/libs dist/tessdata
          # Homebrew on Intel uses /usr/local instead of /opt/homebrew
          cp $(brew --prefix tesseract)/bin/tesseract dist/
          dylibbundler -od -b -x dist/tesseract -d dist/libs -p @executable_path/libs/
          curl -sL "https://github.com/tesseract-ocr/tessdata_fast/raw/main/eng.traineddata" -o dist/tessdata/eng.traineddata
          cd dist
          zip -r ../tesseract-mac-x86_64.zip ./*
          cd ..

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view sidecar-builds || gh release create sidecar-builds -t "Automated Sidecar Builds" -n "Binaries compiled directly by GitHub Actions."
          gh release upload sidecar-builds tesseract-mac-x86_64.zip --clobber

      - name: Commit and push manifest
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          VERSION: ${{ env.tag }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          URL="https://github.com/${{ github.repository }}/releases/download/sidecar-builds/tesseract-mac-x86_64.zip"
          HASH=$(shasum -a 256 tesseract-mac-x86_64.zip | awk '{print $1}')
          SIZE=$(stat -f%z tesseract-mac-x86_64.zip)

          for attempt in 1 2 3; do
            git fetch origin "$BRANCH_NAME"
            git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME"

            jq --arg h "$HASH" --arg u "$URL" --arg s "$SIZE" \
               '.sidecars["tesseract"].platforms["darwin-x86_64"].url = $u | .sidecars["tesseract"].platforms["darwin-x86_64"].sha256 = $h | .sidecars["tesseract"].platforms["darwin-x86_64"].size_bytes = ($s|tonumber)' manifest.json > tmp.json
            mv tmp.json manifest.json

            if git diff --quiet -- manifest.json; then
              echo "No manifest changes detected."
              exit 0
            fi

            git add manifest.json
            git commit -m "chore: Auto-build Tesseract (Intel) to ${VERSION}"

            if git push origin "HEAD:$BRANCH_NAME"; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi

            echo "Push failed on attempt $attempt, retrying..."
            sleep 2
          done

          echo "Failed to push after retries due to remote updates."
          exit 1
