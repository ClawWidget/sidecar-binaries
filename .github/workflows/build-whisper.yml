name: Auto-Build Whisper

on:
  schedule:
    - cron: '15 8 * * *' # Runs daily shortly after the scraper
  workflow_dispatch:

jobs:
  build-whisper:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout our repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Latest Whisper Version
        id: get_version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          api() { curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "$@"; }
          LATEST_TAG=$(api "https://api.github.com/repos/ggml-org/whisper.cpp/releases/latest" | jq -r .tag_name)
          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            LATEST_TAG=$(api "https://api.github.com/repos/ggml-org/whisper.cpp/tags?per_page=1" | jq -r '.[0].name')
          fi
          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            echo "Could not resolve whisper.cpp tag (check API / rate limit)."
            exit 1
          fi
          echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout whisper.cpp source
        uses: actions/checkout@v4
        with:
          repository: ggml-org/whisper.cpp
          ref: ${{ steps.get_version.outputs.tag }}
          path: whisper-src

      - name: Compile Whisper (Apple Silicon)
        run: |
          cd whisper-src
          rm -rf build
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          cp build/bin/whisper-cli ../whisper-mac-arm64
          cd ..

      - name: Create Rolling Release & Upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create a continuous release tag if it doesn't exist
          gh release view sidecar-builds || gh release create sidecar-builds -t "Automated Sidecar Builds" -n "Binaries compiled directly by GitHub Actions."

          # Upload the fresh binary (clobber overwrites the old one)
          gh release upload sidecar-builds whisper-mac-arm64 --clobber

      - name: Commit and push manifest
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.get_version.outputs.tag }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          URL="https://github.com/${{ github.repository }}/releases/download/sidecar-builds/whisper-mac-arm64"
          HASH=$(shasum -a 256 whisper-mac-arm64 | awk '{print $1}')
          SIZE=$(stat -f%z whisper-mac-arm64)

          for attempt in 1 2 3; do
            git fetch origin "$BRANCH_NAME"
            git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME"

            jq --arg v "$VERSION" --arg h "$HASH" --arg u "$URL" --arg s "$SIZE" \
               '.sidecars["whisper"].version = $v |
                .sidecars["whisper"].platforms["darwin-aarch64"].url = $u | .sidecars["whisper"].platforms["darwin-aarch64"].sha256 = $h | .sidecars["whisper"].platforms["darwin-aarch64"].size_bytes = ($s|tonumber)' manifest.json > tmp.json
            mv tmp.json manifest.json

            if git diff --quiet -- manifest.json; then
              echo "No manifest changes detected."
              exit 0
            fi

            git add manifest.json
            git commit -m "chore: Auto-build Whisper to ${VERSION}"

            if git push origin "HEAD:$BRANCH_NAME"; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi

            echo "Push failed on attempt $attempt, retrying..."
            sleep 2
          done

          echo "Failed to push after retries due to remote updates."
          exit 1
