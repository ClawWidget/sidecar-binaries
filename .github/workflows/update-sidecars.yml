name: Auto-Update Sidecars

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update yt-dlp
        run: |
          LATEST_TAG=$(curl -sL https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest | jq -r .tag_name)
          curl -sL "https://github.com/yt-dlp/yt-dlp/releases/download/${LATEST_TAG}/SHA2-256SUMS" -o sums.txt
          HASH=$(grep "yt-dlp_macos$" sums.txt | awk '{print $1}')
          URL="https://github.com/yt-dlp/yt-dlp/releases/download/${LATEST_TAG}/yt-dlp_macos"
          jq --arg v "$LATEST_TAG" --arg h "$HASH" --arg u "$URL" '.sidecars["yt-dlp"].version = $v | .sidecars["yt-dlp"].platforms["darwin-aarch64"].url = $u | .sidecars["yt-dlp"].platforms["darwin-aarch64"].sha256 = $h | .sidecars["yt-dlp"].platforms["darwin-x86_64"].url = $u | .sidecars["yt-dlp"].platforms["darwin-x86_64"].sha256 = $h' manifest.json > tmp.json && mv tmp.json manifest.json
          rm sums.txt

      - name: Update DuckDB
        run: |
          LATEST_TAG=$(curl -sL https://api.github.com/repos/duckdb/duckdb/releases/latest | jq -r .tag_name)
          URL="https://github.com/duckdb/duckdb/releases/download/${LATEST_TAG}/duckdb_cli-osx-universal.zip"
          curl -sL "$URL" -o duckdb.zip
          HASH=$(sha256sum duckdb.zip | awk '{print $1}')
          SIZE=$(stat -c%s duckdb.zip)
          jq --arg v "$LATEST_TAG" --arg h "$HASH" --arg u "$URL" --arg s "$SIZE" '.sidecars["duckdb"].version = $v | .sidecars["duckdb"].platforms["darwin-aarch64"].url = $u | .sidecars["duckdb"].platforms["darwin-aarch64"].sha256 = $h | .sidecars["duckdb"].platforms["darwin-aarch64"].size_bytes = ($s|tonumber) | .sidecars["duckdb"].platforms["darwin-x86_64"].url = $u | .sidecars["duckdb"].platforms["darwin-x86_64"].sha256 = $h | .sidecars["duckdb"].platforms["darwin-x86_64"].size_bytes = ($s|tonumber)' manifest.json > tmp.json && mv tmp.json manifest.json
          rm duckdb.zip

      - name: Update FFmpeg
        run: |
          # 1. Update Apple Silicon (arm64)
          URL_ARM="https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release/ffmpeg.zip"
          curl -sL "$URL_ARM" -o ffmpeg_arm.zip
          HASH_ARM=$(sha256sum ffmpeg_arm.zip | awk '{print $1}')
          SIZE_ARM=$(stat -c%s ffmpeg_arm.zip)

          # 2. Update Intel (amd64)
          URL_INTEL="https://ffmpeg.martin-riedl.de/redirect/latest/macos/amd64/release/ffmpeg.zip"
          curl -sL "$URL_INTEL" -o ffmpeg_intel.zip
          HASH_INTEL=$(sha256sum ffmpeg_intel.zip | awk '{print $1}')
          SIZE_INTEL=$(stat -c%s ffmpeg_intel.zip)

          # Get version from the redirect header (filenames usually contain version)
          VERSION=$(curl -sI "$URL_ARM" | tr -d '\r' | grep -i "^location:" | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | sed -n '1p')
          [ -n "$VERSION" ] || VERSION="latest"

          jq --arg v "$VERSION" \
             --arg h_arm "$HASH_ARM" --arg u_arm "$URL_ARM" --arg s_arm "$SIZE_ARM" \
             --arg h_intel "$HASH_INTEL" --arg u_intel "$URL_INTEL" --arg s_intel "$SIZE_INTEL" \
             '.sidecars["ffmpeg"].version = $v |
              .sidecars["ffmpeg"].platforms["darwin-aarch64"].url = $u_arm | .sidecars["ffmpeg"].platforms["darwin-aarch64"].sha256 = $h_arm | .sidecars["ffmpeg"].platforms["darwin-aarch64"].size_bytes = ($s_arm|tonumber) |
              .sidecars["ffmpeg"].platforms["darwin-x86_64"].url = $u_intel | .sidecars["ffmpeg"].platforms["darwin-x86_64"].sha256 = $h_intel | .sidecars["ffmpeg"].platforms["darwin-x86_64"].size_bytes = ($s_intel|tonumber)' manifest.json > tmp.json && mv tmp.json manifest.json
          rm ffmpeg_arm.zip ffmpeg_intel.zip

      - name: Update Pandoc
        run: |
          RELEASE_DATA=$(curl -sL -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/jgm/pandoc/releases/latest")
          LATEST_TAG=$(echo "$RELEASE_DATA" | jq -r .tag_name)

          # Separate macOS zips per arch (not a single universal zip)
          URL_ARM=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name | test("arm64-macOS\\.zip$")) | .browser_download_url')
          URL_INTEL=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name | test("x86_64-macOS\\.zip$")) | .browser_download_url')

          curl -sL "$URL_ARM" -o pandoc_arm.zip
          HASH_ARM=$(sha256sum pandoc_arm.zip | awk '{print $1}')
          SIZE_ARM=$(stat -c%s pandoc_arm.zip)

          curl -sL "$URL_INTEL" -o pandoc_intel.zip
          HASH_INTEL=$(sha256sum pandoc_intel.zip | awk '{print $1}')
          SIZE_INTEL=$(stat -c%s pandoc_intel.zip)

          jq --arg v "$LATEST_TAG" \
             --arg h_arm "$HASH_ARM" --arg u_arm "$URL_ARM" --arg s_arm "$SIZE_ARM" \
             --arg h_intel "$HASH_INTEL" --arg u_intel "$URL_INTEL" --arg s_intel "$SIZE_INTEL" \
             '.sidecars["pandoc"].version = $v |
              .sidecars["pandoc"].platforms["darwin-aarch64"].url = $u_arm | .sidecars["pandoc"].platforms["darwin-aarch64"].sha256 = $h_arm | .sidecars["pandoc"].platforms["darwin-aarch64"].size_bytes = ($s_arm|tonumber) |
              .sidecars["pandoc"].platforms["darwin-x86_64"].url = $u_intel | .sidecars["pandoc"].platforms["darwin-x86_64"].sha256 = $h_intel | .sidecars["pandoc"].platforms["darwin-x86_64"].size_bytes = ($s_intel|tonumber)' manifest.json > tmp.json && mv tmp.json manifest.json
          rm pandoc_arm.zip pandoc_intel.zip

      - name: Update ExifTool
        run: |
          # 1. Scrape the official site for the latest tar.gz version
          HTML=$(curl -sL https://exiftool.org/)
          TAR_FILE=$(echo "$HTML" | grep -oE 'Image-ExifTool-[0-9]+\.[0-9]+\.tar\.gz' | head -n 1)
          VERSION=$(echo "$TAR_FILE" | grep -oE '[0-9]+\.[0-9]+')
          URL="https://exiftool.org/$TAR_FILE"

          # 2. Download and hash
          curl -sL "$URL" -o exiftool.tar.gz
          HASH=$(sha256sum exiftool.tar.gz | awk '{print $1}')
          SIZE=$(stat -c%s exiftool.tar.gz)

          # 3. Update manifest (Universal Perl script)
          jq --arg v "$VERSION" --arg h "$HASH" --arg u "$URL" --arg s "$SIZE" \
             '.sidecars["exiftool"].version = $v |
              .sidecars["exiftool"].platforms["darwin-aarch64"].url = $u | .sidecars["exiftool"].platforms["darwin-aarch64"].sha256 = $h | .sidecars["exiftool"].platforms["darwin-aarch64"].size_bytes = ($s|tonumber) |
              .sidecars["exiftool"].platforms["darwin-x86_64"].url = $u | .sidecars["exiftool"].platforms["darwin-x86_64"].sha256 = $h | .sidecars["exiftool"].platforms["darwin-x86_64"].size_bytes = ($s|tonumber)' manifest.json > tmp.json && mv tmp.json manifest.json
          rm exiftool.tar.gz

      - name: Update Meta Timestamp
        run: |
          jq '.meta.last_updated = (now | strftime("%Y-%m-%dT%H:%M:%SZ"))' manifest.json > tmp.json && mv tmp.json manifest.json

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Auto-update sidecars (+ Pandoc, ExifTool)"
          file_pattern: manifest.json
